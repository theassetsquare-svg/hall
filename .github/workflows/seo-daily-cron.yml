name: SEO 24h Daily Automation

on:
  schedule:
    # 매일 03:00 UTC = 한국 12:00 정오
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sitemap-lastmod-bump:
    name: Sitemap lastmod 자동 갱신
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update sitemap.xml lastmod to today
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          sed -i -E "s|<lastmod>[0-9]{4}-[0-9]{2}-[0-9]{2}</lastmod>|<lastmod>${TODAY}</lastmod>|g" sitemap.xml
          echo "Updated lastmod to ${TODAY}"

      - name: Update HTML last-modified meta tags
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          ISO_TODAY="${TODAY}T00:00:00+09:00"
          for html in index.html */index.html; do
            sed -i -E "s|<meta name=\"last-modified\" content=\"[0-9-]+\">|<meta name=\"last-modified\" content=\"${TODAY}\">|" "$html"
            sed -i -E "s|<meta property=\"article:modified_time\" content=\"[0-9T:+-]+\">|<meta property=\"article:modified_time\" content=\"${ISO_TODAY}\">|" "$html"
            sed -i -E "s|\"dateModified\":\"[0-9T:+-]+\"|\"dateModified\":\"${ISO_TODAY}\"|g" "$html"
          done
          echo "Updated meta tags + dateModified to ${TODAY}"

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml index.html */index.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🤖 자동: sitemap + dateModified $(date -u +%Y-%m-%d) 갱신 [skip ci]"
            git push
          fi

  indexnow-ping:
    name: IndexNow API 자동 핑 (Bing/Yandex/Seznam)
    runs-on: ubuntu-latest
    needs: sitemap-lastmod-bump
    steps:
      - name: Ping IndexNow
        run: |
          # IndexNow protocol — Bing/Yandex 즉시 색인 알림
          # 키파일 검증 필요: /indexnow-{KEY}.txt 가 사이트에 있어야 함
          # (현재는 키 파일 없으므로 단순 sitemap ping만 수행)

          # Google sitemap ping (deprecated but still works for some)
          # curl -s -o /dev/null -w "%{http_code}\n" "https://www.google.com/ping?sitemap=https://hall-8i2.pages.dev/sitemap.xml" || true

          # Bing IndexNow (키 없으면 401, 키 있으면 200/202)
          curl -s -X POST "https://api.indexnow.org/IndexNow" \
            -H "Content-Type: application/json" \
            -d '{
              "host":"hall-8i2.pages.dev",
              "key":"PLACEHOLDER-CREATE-KEY-IF-NEEDED",
              "urlList":[
                "https://hall-8i2.pages.dev/",
                "https://hall-8i2.pages.dev/tradition/",
                "https://hall-8i2.pages.dev/music/",
                "https://hall-8i2.pages.dev/rooms/",
                "https://hall-8i2.pages.dev/atmosphere/",
                "https://hall-8i2.pages.dev/review/",
                "https://hall-8i2.pages.dev/faq/",
                "https://hall-8i2.pages.dev/contact/"
              ]
            }' || true

          echo "IndexNow ping 완료 (키 미설정 시 401 정상)"

      - name: Naver Search Advisor ping (수동 RSS 푸시)
        run: |
          # 네이버는 IndexNow 미지원. Sitemap 변경 알림은 SC에서 수동.
          # 다만 robots.txt에 sitemap 명시되어 있으므로 자연 색인 OK.
          echo "Naver는 수동 SC 제출 권장 (https://searchadvisor.naver.com)"
